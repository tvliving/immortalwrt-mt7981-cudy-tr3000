name: Build OpenWrt Firmware

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REPO_URL: https://github.com/padavanonly/immortalwrt-mt798x-6.6
  REPO_BRANCH: openwrt-24.10-6.6
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: config/256m.config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  TZ: Asia/Shanghai

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-firmware:
    runs-on: ubuntu-22.04
    steps:
      - name: 🙌 Checkout local files
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🚥 Install full compilation dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libncurses-dev build-essential git wget python3 bzip2 \
            flex bison gawk gcc-multilib g++-multilib gettext \
            libssl-dev libelf-dev libncurses5-dev rsync unzip zlib1g-dev \
            file curl ca-certificates xz-utils patch libcrypt-dev  # 补充libcrypt依赖
          sudo apt-get clean

          # 创建编译工作目录
          sudo mkdir -p /workdir
          sudo chown $USER:$GROUPS /workdir

      - name: 🪜 Clone OpenWrt source code
        working-directory: /workdir
        run: |
          echo "📥 Cloning source code: $REPO_URL (branch: $REPO_BRANCH)"
          git clone $REPO_URL -b $REPO_BRANCH --single-branch --filter=blob:none openwrt
          ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt
          echo "✅ Source code cloned successfully"

      - name: 👩‍💻 Copy preset config file
        run: |
          if [ -f "$GITHUB_WORKSPACE/${CONFIG_FILE}" ]; then
            echo "📁 Using preset config: $CONFIG_FILE"
            cp -f "$GITHUB_WORKSPACE/${CONFIG_FILE}" /workdir/openwrt/.config
          else
            echo "⚠️ No preset config found, generate default config"
            cd /workdir/openwrt && make defconfig
          fi

      - name: ⚙️ Load custom feeds
        run: |
          set -e
          # 替换自定义feeds配置
          [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
          # 执行第一阶段自定义脚本
          chmod +x $DIY_P1_SH
          cd openwrt && $GITHUB_WORKSPACE/$DIY_P1_SH

      - name: 🧬 Update & install feeds
        run: |
          cd /workdir/openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          # 修复feeds依赖缺失警告（手动安装缺失包）
          ./scripts/feeds install -p packages libcrypt-compat python3-pysocks python3-unidecode python-setuptools

      - name: 🧩 Load custom configuration
        run: |
          set -e
          # 复制自定义文件
          [ -e files ] && mv files openwrt/files
          # 执行第二阶段自定义脚本
          chmod +x $DIY_P2_SH
          cd openwrt && $GITHUB_WORKSPACE/$DIY_P2_SH

      - name: 🛠️ Generate final config (非交互式)
        run: |
          cd /workdir/openwrt
          # 关键修复：移除交互式make menuconfig，改用纯命令行确认配置
          make defconfig  # 生成/确认配置（无终端依赖）
          make -j1 oldconfig  # 自动确认配置变更（非交互式）
          echo "✅ Config generated successfully"

      - name: 🔨 Start compiling firmware
        run: |
          cd /workdir/openwrt
          # 预下载编译依赖（避免编译中断）
          make download -j$(nproc)
          # 编译（-j$(nproc)用最大线程，失败时切单线程输出详细日志）
          make -j$(nproc) || make -j1 V=s
          echo "✅ Compilation completed!"

      - name: 📤 Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-mt798x-firmware
          path: /workdir/openwrt/bin/targets/
          retention-days: 7
          if-no-files-found: warn
