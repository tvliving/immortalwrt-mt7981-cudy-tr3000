name: make menuconfig

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REPO_URL: https://github.com/padavanonly/immortalwrt-mt798x-6.6
  REPO_BRANCH: openwrt-24.10-6.6
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: config/256m.config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  TZ: Asia/Shanghai

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  menuconfig:
    runs-on: ubuntu-22.04
    steps:
      - name: 🙌 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: 🚥 Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libncurses-dev build-essential git wget python3 bzip2 \
            flex bison gawk gcc-multilib g++-multilib gettext \
            libssl-dev libelf-dev libncurses5-dev rsync unzip zlib1g-dev
          sudo apt-get clean

          sudo mkdir -p /workdir
          sudo chown $USER:$GROUPS /workdir

      - name: 🪜 Clone source code
        working-directory: /workdir
        run: |
          git clone $REPO_URL -b $REPO_BRANCH --single-branch --filter=blob:none openwrt
          ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

      - name: 👩‍💻 Copy previous config if exists
        run: |
          if [ -f "$GITHUB_WORKSPACE/${CONFIG_FILE}" ]; then
            cp -f "$GITHUB_WORKSPACE/${CONFIG_FILE}" /workdir/openwrt/.config
          else
            echo "⚠️ No previous config found"
          fi

      - name: ⚙️ Load custom feeds
        run: |
          set -e
          [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
          chmod +x $DIY_P1_SH
          cd openwrt && $GITHUB_WORKSPACE/$DIY_P1_SH

      - name: 🧬 Update feeds
        run: cd openwrt && ./scripts/feeds update -a

      - name: 🪛 Install feeds
        run: cd openwrt && ./scripts/feeds install -a

      - name: 🧩 Load custom configuration
        run: |
          set -e
          [ -e files ] && mv files openwrt/files
          [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
          chmod +x $DIY_P2_SH
          cd openwrt && $GITHUB_WORKSPACE/$DIY_P2_SH

      - name: 🛠️ 初始化 menuconfig 配置
        run: |
          cd /workdir/openwrt
          [ ! -f .config ] && make defconfig
          echo "✅ 连接 tmate 后执行：cd /workdir/openwrt && make menuconfig"

      # 核心修改：改用 v2 版本，参数生效
      - name: Setup tmate session（消除警告）
        uses: mxschmitt/action-tmate@v2
        with:
          disable-ssh-key-check: true  # v2 支持该参数，彻底消除警告
          timeout: 120m                # v2 用 timeout 控制超时（单位：m=分钟/h=小时）

      # 移除提交步骤（无需提交代码）
